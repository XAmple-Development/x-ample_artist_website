<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Forms</title>
  </head>
  <body>
    <!-- This file exists only so Netlify registers the form at build time. -->
    <!-- It is never shown to users. Field names must match NewsletterForm.tsx. -->
    <form name="signal-list" netlify netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input type="text" name="city" />
      <input type="text" name="bot-field" />
    </form>
  </body>
</html>
